name: Publish secure-stegano to PyPI

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Set version
        working-directory: algorithms
        run: sed -i "s/^version = .*/version = \"1.0.${{ github.run_number }}\"/" pyproject.toml

      - name: Build distribution packages
        working-directory: algorithms
        run: python -m build
        # produces dist/algo_stegano_tpi-*.tar.gz and dist/algo_stegano_tpi-*.whl

      - name: Publish to PyPI
        working-directory: algorithms
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
