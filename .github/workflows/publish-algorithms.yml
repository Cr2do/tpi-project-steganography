name: Publish tpi-stegano to GitHub Packages

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Set version
        working-directory: algorithms
        run: sed -i "s/^version = .*/version = \"1.0.${{ github.run_number }}\"/" pyproject.toml

      - name: Build distribution packages
        working-directory: algorithms
        run: python -m build
        # produces dist/tpi_stegano-*.tar.gz and dist/tpi_stegano-*.whl

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "algorithms/v1.0.${{ github.run_number }}"
          name: "algo-stegano-tpi v1.0.${{ github.run_number }}"
          files: |
            algorithms/dist/*.whl
            algorithms/dist/*.tar.gz
